services:
  db:
    image: postgres:15
    container_name: lms_database
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=lms_db
      - POSTGRES_USER=salsa
      - POSTGRES_PASSWORD=rahasia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salsa -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: lms_app
    stdin_open: true
    tty: true
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy